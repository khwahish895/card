<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Hover Effect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* Card */
.card {
    width: 300px;
    height: 200px;
    background: white;
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    transition: all 0.4s ease;
    cursor: pointer;
}

/* Hover Effect */
.card:hover {
    transform: translateY(-15px) scale(1.05);
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

/* Card Content */
.card h2 {
    margin-bottom: 10px;
    color: #333;
}

.card p {
    color: #666;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Hover Card</h2>
    <p>This card moves up and scales smoothly when you hover over it.</p>
</div>

</body>
</html>
